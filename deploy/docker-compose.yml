# Local on-premise orchestrator (mock-friendly demo stack).
# ROCm GPU services are intentionally omitted — run inference on host when ready.

version: "3.9"

services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: logisecure
      POSTGRES_USER: logisecure
      POSTGRES_PASSWORD: logisecure
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U logisecure -d logisecure"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.backend
    environment:
      DATABASE_URL: postgresql://logisecure:logisecure@postgres:5432/logisecure
      USE_MOCKS: "true"
      AI_MOCK_MODE: "true"
      CORS_ORIGINS: http://localhost:3000,http://localhost:5173,http://127.0.0.1:3000
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.frontend
    environment:
      VITE_LOGISECURE_API: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:
